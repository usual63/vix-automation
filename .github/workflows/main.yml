name: Integrated-Strategy-Automation

on:
  schedule:
    - cron: '5 22 * * *' # 한국 시간 오전 7:05 (매일 자동 실행)
  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-strategies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas requests yfinance pytz
      - name: Run VIX Strategy
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python vix_strategy.py
      - name: Run MSTR Strategy
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python mstr_strategy.py
